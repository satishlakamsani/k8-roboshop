apiVersion: apps/v1
kind: Deployment
metadata: 
   name: redis 
   namespace: roboshop
   #these labels are replicaset labels
   labels: 
     project: roboshop
     tier: db
     component: redis
spec: 
     replicas: 1
     selector: 
     # using these labels replica set selects the pod
      matchLabels: 
        project: roboshop
        tier: db
        component: redis
      #pods are creating here.pods is subset of replicaset
      template:
        metadata:
         labels: 
           project: roboshop
           tier: db 
           component: redis
        spec:
          selector: 
            # labels are used as selectors
           project: roboshop
           tier: db
           component: redis
          ports:
          - protocol: TCP
            port: 6379 # servie port
            targetPort: 6379 # container port

    

       