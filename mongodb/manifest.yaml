apiVersion: apps/v1
kind: Deployment
metadata: 
   name: mongodb
   namespace: roboshop
   # these labels are replicaset labels
   labels: 
     project: roboshop
     tier: db
     component: mongodb

spec: 
  replicas: 1
  selector: 
     # using these labels replica set selects the pod
     matchLabels: 
        project: roboshop
        tier: db
        component: mongodb
    # using these labels replica set selects the pod
     spec: 
        containers: 
        - name: mongodb
          image: satishlakamsani/mongodb:1.0.0

---

apiVersion: v1
kind: Service
metadata: 
   name: mongodb
   namespace: roboshop
   labels: 
    project: roboshop
    tier: db
    component: frontend

spec: 
   selector: 
   # labels are used as selectors
   project: roboshop
   tier: db
   component: mongodb

   ports: 
   - protocol: TCP
     port: 27017 #service port
     targetPort: 27017 #container port